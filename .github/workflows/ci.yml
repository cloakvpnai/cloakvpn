name: CI

on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

jobs:
  server-shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shellcheck server/scripts/*.sh

  api-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - name: Build API
        working-directory: server/api
        run: |
          go mod tidy
          go vet ./...
          go build ./...

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: '1.9.5' }
      - name: fmt + validate
        working-directory: infra/terraform
        env:
          TF_VAR_hcloud_token: dummy
        run: |
          terraform fmt -check -recursive
          terraform init -backend=false
          terraform validate

  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - name: Build debug APK
        working-directory: clients/android
        run: ./gradlew :app:assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: cloak-vpn-debug-apk
          path: clients/android/app/build/outputs/apk/debug/app-debug.apk

  ios-build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Resolve SPM & build (unsigned)
        working-directory: clients/ios
        run: |
          # Placeholder — will work once an .xcodeproj is committed.
          ls -la
          echo "Xcode project not yet committed; skipping."
