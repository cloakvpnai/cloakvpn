# Project-wide Gradle settings for the Lattice VPN Android client.

# JVM args for the Gradle daemon. 2 GB heap is comfortable for an
# app-module-only build; bump if multi-module builds get added later.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Run independent tasks in parallel.
org.gradle.parallel=true

# AndroidX — required; the legacy android.support.* libraries are EOL.
android.useAndroidX=true

# Per-module R classes (smaller, faster builds; no transitive R fields).
android.nonTransitiveRClass=true

# Kotlin official code style.
kotlin.code.style=official
