<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lattice VPN - 3D Hero</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at center, #3a3a3a 0%, #151515 100%);
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
    <!-- Import map for modern three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.171.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.171.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- Setup ---
        const container = document.getElementById('canvas-container');
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        container.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        // Transparent background so the CSS gradient shows through
        scene.fog = new THREE.FogExp2(0x1a1a1a, 0.15); // Volumetric cinematic fog matching gradient

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 4.5);

        // --- Post-Processing (Bloom) ---
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.1,  // strength
            0.6,  // radius
            0.1   // threshold
        );
        composer.addPass(bloomPass);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.1);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
        directionalLight.position.set(5, 5, 5);
        scene.add(directionalLight);

        // Subtle rim light for depth
        const rimLight = new THREE.PointLight(0x5FE3B5, 1.0, 10);
        rimLight.position.set(-3, 3, -2);
        scene.add(rimLight);

        // --- Lattice Shield Generation ---
        const shieldGroup = new THREE.Group();
        scene.add(shieldGroup);

        // Center light emitting from the shield core
        const coreLight = new THREE.PointLight(0xFFB347, 1.5, 5);
        coreLight.position.set(0, 0, 0.2);
        shieldGroup.add(coreLight);

        // --- Conversion ---
        function svgToWorld(sx, sy) {
            const wx = (sx - 100) * 0.015;
            const wy = -(sy - 120) * 0.015;
            const wz = Math.cos(wx * 1.8) * 0.15 - Math.abs(wy - 0.2) * 0.05;
            return new THREE.Vector3(wx, wy, wz);
        }

        // --- Lattice Geometry ---
        // 14 Specific Nodes
        const nodeSpecs = [
            { type: 'mint', r: 4, coords: [[65,75], [135,75], [65,155], [135,155]] },
            { type: 'mint', r: 3, coords: [[35,75], [165,75], [55,190], [145,190]] },
            { type: 'amber', r: 5, coords: [[100,75], [100,155]] },
            { type: 'center', r: 6, coords: [[100,115]] },
            { type: 'amber', r: 4, coords: [[100,190], [32,115], [168,115]] }
        ];

        const nodes = [];
        nodeSpecs.forEach(spec => {
            spec.coords.forEach(([sx, sy]) => {
                const pos = svgToWorld(sx, sy);
                nodes.push({ type: spec.type, r: spec.r * 0.015, pos });
            });
        });

        // Lines
        const mintSvgLines = [
            [35,75, 165,75], [38,155, 162,155], [55,190, 145,190], // Horizontals
            [65,55, 65,195], [100,35, 100,75], [100,190, 100,210], [135,55, 135,195], // Verticals
            [35,75, 100,115], [165,75, 100,115], [100,115, 32,155], [100,115, 168,155], [32,155, 100,190], [168,155, 100,190] // Diagonals
        ];
        
        const amberSvgLines = [
            [32,115, 168,115], // Horizontal connecting side amber dots
            [100,75, 100,190]  // Vertical connecting spine amber dots
        ];

        const mintLineSegments = mintSvgLines.map(coords => ({
            start: svgToWorld(coords[0], coords[1]),
            end: svgToWorld(coords[2], coords[3])
        }));

        const amberLineSegments = amberSvgLines.map(coords => ({
            start: svgToWorld(coords[0], coords[1]),
            end: svgToWorld(coords[2], coords[3])
        }));

        const allLineSegments = [...mintLineSegments, ...amberLineSegments];

        // --- Materials & Meshes ---
        const materialMint = new THREE.MeshStandardMaterial({ 
            color: 0x5FE3B5, emissive: 0x5FE3B5, emissiveIntensity: 1.0, roughness: 0.2, metalness: 0.8
        });
        const materialAmber = new THREE.MeshStandardMaterial({ 
            color: 0xFFB347, emissive: 0xFFB347, emissiveIntensity: 1.3, roughness: 0.2, metalness: 0.8
        });
        const materialCenter = new THREE.MeshStandardMaterial({ 
            color: 0xFFD885, emissive: 0xFFB347, emissiveIntensity: 2.0, roughness: 0.1, metalness: 1.0
        });

        const nodeMeshes = [];
        nodes.forEach(n => {
            let baseMat;
            if (n.type === 'center') baseMat = materialCenter;
            else if (n.type === 'amber') baseMat = materialAmber;
            else baseMat = materialMint;
            
            const mat = baseMat.clone();
            mat.userData.baseIntensity = mat.emissiveIntensity;
            mat.userData.phaseOffset = n.pos.x * 2.0 + n.pos.y * 3.0; 
            mat.userData.isCenter = n.type === 'center';
            
            const geom = new THREE.SphereGeometry(n.r, 16, 16);
            const mesh = new THREE.Mesh(geom, mat);
            mesh.position.copy(n.pos);
            
            shieldGroup.add(mesh);
            nodeMeshes.push(mesh);
        });

        // Edge lines (Thick cylinders)
        const thickEdgeMintMat = new THREE.MeshStandardMaterial({
            color: 0x5FE3B5, emissive: 0x5FE3B5, emissiveIntensity: 1.0, roughness: 0.2, metalness: 0.8,
            transparent: true, opacity: 0.8
        });
        const thickEdgeAmberMat = new THREE.MeshStandardMaterial({
            color: 0xFFB347, emissive: 0xFFB347, emissiveIntensity: 1.3, roughness: 0.2, metalness: 0.8,
            transparent: true, opacity: 0.8
        });
        
        const lineThickness = 0.006; // world units thickness

        function createThickLine(start, end, material) {
            const distance = start.distanceTo(end);
            const geometry = new THREE.CylinderGeometry(lineThickness, lineThickness, distance, 6, 1, false);
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.copy(start).lerp(end, 0.5);
            mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), end.clone().sub(start).normalize());
            return mesh;
        }

        mintLineSegments.forEach(seg => {
            shieldGroup.add(createThickLine(seg.start, seg.end, thickEdgeMintMat));
        });
        amberLineSegments.forEach(seg => {
            shieldGroup.add(createThickLine(seg.start, seg.end, thickEdgeAmberMat));
        });

        // Shield Outline Tube
        const shieldShape = new THREE.CurvePath();
        shieldShape.add(new THREE.LineCurve3(svgToWorld(100, 20), svgToWorld(180, 50)));
        shieldShape.add(new THREE.LineCurve3(svgToWorld(180, 50), svgToWorld(180, 130)));
        shieldShape.add(new THREE.QuadraticBezierCurve3(svgToWorld(180, 130), svgToWorld(180, 180), svgToWorld(100, 220)));
        shieldShape.add(new THREE.QuadraticBezierCurve3(svgToWorld(100, 220), svgToWorld(20, 180), svgToWorld(20, 130)));
        shieldShape.add(new THREE.LineCurve3(svgToWorld(20, 130), svgToWorld(20, 50)));
        shieldShape.add(new THREE.LineCurve3(svgToWorld(20, 50), svgToWorld(100, 20)));

        const tubeGeom = new THREE.TubeGeometry(shieldShape, 64, 0.025, 8, true);
        const tubeMat = new THREE.MeshStandardMaterial({
            color: 0xC8F5DD, emissive: 0xC8F5DD, emissiveIntensity: 1.3, roughness: 0.2, metalness: 0.8
        });
        const shieldOutline = new THREE.Mesh(tubeGeom, tubeMat);
        shieldGroup.add(shieldOutline);

        // Ambient Volumetric Sphere
        const ambientSphereGeom = new THREE.SphereGeometry(8, 32, 32);
        const ambientSphereMat = new THREE.MeshBasicMaterial({
            color: 0x5FE3B5,
            transparent: true,
            opacity: 0.02,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        const ambientSphere = new THREE.Mesh(ambientSphereGeom, ambientSphereMat);
        scene.add(ambientSphere);

        // --- Data Particles ---
        const particles = [];
        const particleGeom = new THREE.SphereGeometry(0.018, 8, 8);
        const particleMat = new THREE.MeshBasicMaterial({ color: 0x5FE3B5 });

        for (let i = 0; i < 60; i++) {
            const pMesh = new THREE.Mesh(particleGeom, particleMat);
            shieldGroup.add(pMesh);
            
            const line = allLineSegments[Math.floor(Math.random() * allLineSegments.length)];
            
            particles.push({
                mesh: pMesh,
                currentLine: line,
                progress: Math.random(),
                speed: 0.001 + Math.random() * 0.004,
                direction: Math.random() > 0.5 ? 1 : -1
            });
        }

        // --- Interaction ---
        const mouse = new THREE.Vector2();
        const targetRotation = new THREE.Vector2();
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');

        window.addEventListener('mousemove', (e) => {
            if (prefersReducedMotion.matches) return;
            // Map mouse to [-1, 1] range
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            // Subtle rotation bounds
            targetRotation.x = mouse.y * 0.15;
            targetRotation.y = mouse.x * 0.25;
        });

        // --- Resize Handler ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        let ambientRotationY = 0;

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // Pulse nodes
            nodeMeshes.forEach(mesh => {
                const mat = mesh.material;
                if (!mat.userData.isCenter) {
                    // Very subtle pulse: +/- 5%, period ~4s
                    const pulse = Math.sin(time * (Math.PI / 2) + mat.userData.phaseOffset) * 0.05 + 0.95;
                    mat.emissiveIntensity = mat.userData.baseIntensity * pulse;
                }
            });

            // Move data particles
            particles.forEach(p => {
                p.progress += p.speed * p.direction;
                if (p.progress >= 1.0 || p.progress <= 0.0) {
                    p.currentLine = allLineSegments[Math.floor(Math.random() * allLineSegments.length)];
                    p.direction = Math.random() > 0.5 ? 1 : -1;
                    p.progress = p.direction === 1 ? 0 : 1;
                }
                
                p.mesh.position.lerpVectors(p.currentLine.start, p.currentLine.end, p.progress);
            });

            // Parallax and Ambient Rotation
            ambientRotationY += 0.05 * delta;
            
            if (!prefersReducedMotion.matches) {
                shieldGroup.rotation.x += (targetRotation.x - shieldGroup.rotation.x) * 0.05;
                // Lerp towards mouse + ambient rotation
                shieldGroup.rotation.y += ((targetRotation.y + ambientRotationY) - shieldGroup.rotation.y) * 0.05;
            } else {
                shieldGroup.rotation.y = ambientRotationY;
            }
            
            // Very slow bobbing
            shieldGroup.position.y = Math.sin(time * 0.5) * 0.05;

            composer.render();
        }

        animate();
    </script>
</body>
</html>
